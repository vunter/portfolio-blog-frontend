<div class="auth-page">
  <app-theme-toggle variant="floating" />
  <div class="auth-card">
    <div class="auth-header">
      <h1>{{ i18n.t('auth.mfa.title') }}</h1>
      <p>{{ i18n.t(method() === 'TOTP' ? 'auth.mfa.totpSubtitle' : 'auth.mfa.emailSubtitle') }}</p>
    </div>

    <form class="auth-form" [formGroup]="mfaForm" (ngSubmit)="onSubmit()">
      @if (error()) {
        <div class="error-alert" role="alert">{{ error() }}</div>
      }

      <div class="form-group">
        <label for="code">{{ i18n.t('auth.mfa.codeLabel') }} <span class="required">*</span></label>
        <input
          type="text"
          id="code"
          formControlName="code"
          [placeholder]="i18n.t('auth.mfa.codePlaceholder')"
          [disabled]="loading()"
          maxlength="6"
          autocomplete="one-time-code"
          inputmode="numeric"
          pattern="[0-9]*"
        />
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
          {{ i18n.t('auth.mfa.verifying') }}
        } @else {
          {{ i18n.t('auth.mfa.verify') }}
        }
      </button>
    </form>

    <div class="mfa-actions">
      @if (method() === 'EMAIL') {
        <button class="mfa-link-btn" (click)="resendEmailOtp()" [disabled]="sendingOtp()">
          {{ sendingOtp() ? i18n.t('auth.mfa.sending') : i18n.t('auth.mfa.resendCode') }}
        </button>
      }
      <button class="mfa-link-btn" (click)="switchMethod()">
        {{ i18n.t(method() === 'TOTP' ? 'auth.mfa.useEmail' : 'auth.mfa.useTotp') }}
      </button>
    </div>

    <div class="auth-footer">
      <a routerLink="/auth/login">{{ i18n.t('auth.mfa.backToLogin') }}</a>
    </div>
  </div>
</div>
