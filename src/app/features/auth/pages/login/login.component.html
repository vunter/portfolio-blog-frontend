<div class="auth-page">
 <app-theme-toggle variant="floating" />
 <div class="auth-lang-toggle">
 <button
 class="auth-lang-btn"
 [class.active]="i18n.language() === 'en'"
 (click)="i18n.setLanguage('en')"
 >EN</button>
 <button
 class="auth-lang-btn"
 [class.active]="i18n.language() === 'pt'"
 (click)="i18n.setLanguage('pt')"
 >PT</button>
 <button
 class="auth-lang-btn"
 [class.active]="i18n.language() === 'es'"
 (click)="i18n.setLanguage('es')"
 >ES</button>
 <button
 class="auth-lang-btn"
 [class.active]="i18n.language() === 'it'"
 (click)="i18n.setLanguage('it')"
 >IT</button>
 </div>
 <div class="auth-card">
 <div class="auth-header">
 <h1>{{ i18n.t('auth.login.welcome') }}</h1>
 <p>{{ i18n.t('auth.login.subtitle') }}</p>
 </div>

 <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
 @if (error()) {
 <div class="error-alert" id="login-error" role="alert">
 {{ error() }}
 </div>
 }

 <div class="form-group">
 <label for="email">{{ i18n.t('auth.login.email') }} <span class="required">*</span></label>
 <input
 type="email"
 id="email"
 formControlName="email"
 [placeholder]="i18n.t('auth.login.emailPlaceholder')"
 [disabled]="loading()"
 [attr.aria-describedby]="error() ? 'login-error' : null"
 />
 </div>

 <div class="form-group">
 <label for="password">{{ i18n.t('auth.login.password') }} <span class="required">*</span></label>
 <div class="password-input">
 <input
 [type]="showPassword() ? 'text' : 'password'"
 id="password"
 formControlName="password"
 placeholder="••••••••"
 [disabled]="loading()"
 />
 <button
 type="button"
 class="toggle-password"
 (click)="showPassword.set(!showPassword())"
 [attr.aria-label]="showPassword() ? i18n.t('auth.login.hidePassword') : i18n.t('auth.login.showPassword')"
 >
 @if (showPassword()) {
 <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
 <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
 <line x1="1" y1="1" x2="23" y2="23"/>
 </svg>
 } @else {
 <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
 <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
 <circle cx="12" cy="12" r="3"/>
 </svg>
 }
 </button>
 </div>
 </div>

 <div class="form-options">
 <label class="remember-me">
 <input type="checkbox" formControlName="rememberMe" />
 {{ i18n.t('auth.login.rememberMe') }}
 </label>
 <a routerLink="/auth/forgot-password" class="forgot-link">
 {{ i18n.t('auth.login.forgotPassword') }}
 </a>
 </div>

 <button type="submit" class="submit-btn" [disabled]="loading()">
 @if (loading()) {
 <span class="spinner"></span>
 {{ i18n.t('auth.login.loading') }}
 } @else {
 {{ i18n.t('auth.login.submit') }}
 }
 </button>
 </form>

 <div class="auth-footer">
 <p>
 {{ i18n.t('auth.login.noAccount') }}
 <a routerLink="/auth/register">{{ i18n.t('auth.login.createAccount') }}</a>
 </p>
 </div>
 </div>
</div>
