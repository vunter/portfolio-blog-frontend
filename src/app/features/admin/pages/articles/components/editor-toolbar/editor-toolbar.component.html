<div class="md-toolbar">
 <button type="button" class="md-btn" (click)="onInsert('bold')" title="Bold (Ctrl+B)">
 <strong>B</strong>
 </button>
 <button type="button" class="md-btn" (click)="onInsert('italic')" title="Italic (Ctrl+I)">
 <em>I</em>
 </button>
 <button type="button" class="md-btn" (click)="onInsert('strikethrough')" title="Strikethrough">
 <s>S</s>
 </button>
 <span class="md-separator"></span>
 <button type="button" class="md-btn" (click)="onInsert('h1')" title="Heading 1">H1</button>
 <button type="button" class="md-btn" (click)="onInsert('h2')" title="Heading 2">H2</button>
 <button type="button" class="md-btn" (click)="onInsert('h3')" title="Heading 3">H3</button>
 <span class="md-separator"></span>
 <button type="button" class="md-btn" (click)="onInsert('ul')" title="Unordered List">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
 </button>
 <button type="button" class="md-btn" (click)="onInsert('ol')" title="Ordered List">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
 </button>
 <button type="button" class="md-btn" (click)="onInsert('checklist')" title="Task List">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
 </button>
 <span class="md-separator"></span>
 <button type="button" class="md-btn" (click)="onInsert('link')" title="Link">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
 </button>
 <button type="button" class="md-btn" (click)="onInsert('image')" title="Image">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
 </button>
 <button type="button" class="md-btn md-btn--upload" (click)="contentFileInput.click()" [disabled]="uploadingContentImage()" title="Upload Image">
 @if (uploadingContentImage()) {
 <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
 } @else {
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
 }
 </button>
 <input type="file" #contentFileInput accept="image/jpeg,image/png,image/gif,image/webp" (change)="onFileSelected($event)" class="file-input-hidden" />
 <span class="md-separator"></span>
 <button type="button" class="md-btn" (click)="onInsert('code')" title="Inline Code">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
 </button>
 <button type="button" class="md-btn" (click)="onInsert('codeblock')" title="Code Block">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="14 15 18 12 14 9"/><polyline points="10 9 6 12 10 15"/></svg>
 </button>
 <button type="button" class="md-btn" (click)="onInsert('quote')" title="Blockquote">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z"/></svg>
 </button>
 <button type="button" class="md-btn" (click)="onInsert('hr')" title="Horizontal Rule">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="2" y1="12" x2="22" y2="12" stroke-width="2"/></svg>
 </button>
 <button type="button" class="md-btn" (click)="onInsert('table')" title="Table">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
 </button>
</div>
