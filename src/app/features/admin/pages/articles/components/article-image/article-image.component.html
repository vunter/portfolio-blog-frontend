<div class="form-card">
 <h3>{{ i18n.t('admin.articleForm.featuredImage') }}</h3>
 <div class="image-upload">
 @if (imageUrlControl().value) {
 <img [src]="imageUrlControl().value" alt="Preview" class="image-preview" loading="lazy" />
 } @else {
 <div class="image-placeholder" (click)="fileInput.click()" role="button" tabindex="0">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
 <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
 <circle cx="8.5" cy="8.5" r="1.5"/>
 <polyline points="21 15 16 10 5 21"/>
 </svg>
 <span>{{ i18n.t('admin.articleForm.noImage') }}</span>
 </div>
 }
 <div class="image-input-row">
 <input
 type="text"
 [formControl]="imageUrlControl()"
 [placeholder]="i18n.t('admin.articleForm.imageUrl')"
 />
 <button type="button" class="btn-upload" (click)="fileInput.click()" [disabled]="uploading()" [title]="i18n.t('admin.articleForm.uploadImage')">
 @if (uploading()) {
 <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
 } @else {
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
 }
 </button>
 </div>
 <input type="file" #fileInput accept="image/jpeg,image/png,image/gif,image/webp" (change)="onFileSelected($event)" class="file-input-hidden" />
 </div>
</div>
