@if (notificationService.hasNotifications()) {
 <div class="toast-container" role="alert" aria-live="polite">
 @for (notification of notificationService.notifications(); track notification.id) {
 <div
 class="toast toast--{{ notification.type }}"
 [class.toast--clickable]="notification.route"
 role="alert"
 [attr.aria-live]="notification.type === 'error' ? 'assertive' : 'polite'"
 [attr.aria-label]="notification.message"
 (click)="onToastClick(notification)"
 >
 <div class="toast__icon">
 @switch (notification.type) {
 @case ('success') {
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
 <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
 <polyline points="22 4 12 14.01 9 11.01"/>
 </svg>
 }
 @case ('error') {
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
 <circle cx="12" cy="12" r="10"/>
 <line x1="15" y1="9" x2="9" y2="15"/>
 <line x1="9" y1="9" x2="15" y2="15"/>
 </svg>
 }
 @case ('warning') {
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
 <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
 <line x1="12" y1="9" x2="12" y2="13"/>
 <line x1="12" y1="17" x2="12.01" y2="17"/>
 </svg>
 }
 @case ('info') {
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
 <circle cx="12" cy="12" r="10"/>
 <line x1="12" y1="16" x2="12" y2="12"/>
 <line x1="12" y1="8" x2="12.01" y2="8"/>
 </svg>
 }
 }
 </div>
 <span class="toast__message">{{ notification.message }}</span>
 <button
 class="toast__close"
 (click)="dismiss(notification.id); $event.stopPropagation()"
 [attr.aria-label]="i18n.t('common.closeNotification')"
 >
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
 <line x1="18" y1="6" x2="6" y2="18"/>
 <line x1="6" y1="6" x2="18" y2="18"/>
 </svg>
 </button>
 </div>
 }
 </div>
}
