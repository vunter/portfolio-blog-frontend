<!-- TODO F-359: Add role="status" and aria-live="polite" to spinner wrapper for screen reader announcement -->
@if (show()) {
 <div class="spinner-overlay" [class.spinner-overlay--inline]="inline()">
 <div class="spinner" [style.width.px]="size()" [style.height.px]="size()">
 <div class="spinner__ring"></div>
 </div>
 @if (message()) {
 <p class="spinner__message">{{ message() }}</p>
 }
 </div>
}
