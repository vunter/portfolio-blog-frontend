@if (visible()) {
  <div class="terms-overlay" (keydown)="onTabTrap($event)" role="dialog" aria-modal="true"
       aria-labelledby="terms-modal-title" aria-describedby="terms-modal-message">
    <div class="terms-modal" (click)="$event.stopPropagation()">
      <div class="terms-modal__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <h3 class="terms-modal__title" id="terms-modal-title">{{ i18n.t('terms.modal.title') }}</h3>
      <p class="terms-modal__message" id="terms-modal-message">{{ i18n.t('terms.modal.message') }}</p>

      <label class="terms-modal__checkbox">
        <input type="checkbox" [ngModel]="termsChecked()" (ngModelChange)="termsChecked.set($event)">
        <span>
          {{ i18n.t('auth.register.termsPrefix') }}
          <a routerLink="/terms" target="_blank">{{ i18n.t('auth.register.termsLink') }}</a>
          {{ i18n.t('auth.register.termsAnd') }}
          <a routerLink="/privacy" target="_blank">{{ i18n.t('footer.privacy') }}</a>
        </span>
      </label>

      <div class="terms-modal__actions">
        <button class="btn btn-secondary" (click)="decline()">
          {{ i18n.t('terms.modal.decline') }}
        </button>
        <button class="btn btn-primary" [disabled]="!termsChecked() || loading()" (click)="accept()">
          @if (loading()) {
            <span class="spinner"></span>
          }
          {{ i18n.t('terms.modal.accept') }}
        </button>
      </div>
    </div>
  </div>
}
