<div class="media-upload"
 [class.drag-over]="dragOver()"
 (dragover)="onDragOver($event)"
 (dragleave)="onDragLeave($event)"
 (drop)="onDrop($event)">

 <!-- Preview -->
 @if (showPreview()) {
 @if (previewUrl) {
 <div class="preview">
 <img [src]="previewUrl" alt="Preview" class="preview-image" loading="lazy" />
 </div>
 } @else {
 <div class="placeholder" (click)="fileInput.click()" role="button" tabindex="0"
 (keydown.enter)="fileInput.click()" (keydown.space)="fileInput.click()">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
 <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
 <circle cx="8.5" cy="8.5" r="1.5"/>
 <polyline points="21 15 16 10 5 21"/>
 </svg>
 <span class="placeholder-text">
 {{ placeholder() || i18n.t('admin.media.dropOrClick') }}
 </span>
 </div>
 }
 }

 <!-- Controls row -->
 <div class="controls">
 @if (showUrlInput()) {
 <input
 type="text"
 class="url-input"
 [formControl]="imageUrlControl()!"
 [placeholder]="i18n.t('admin.media.pasteUrl')"
 />
 }
 <button type="button" class="btn-upload" (click)="fileInput.click()" [disabled]="uploading()"
 [title]="i18n.t('admin.media.upload')">
 @if (uploading()) {
 <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
 <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
 </svg>
 } @else {
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
 <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
 <polyline points="17 8 12 3 7 8"/>
 <line x1="12" y1="3" x2="12" y2="15"/>
 </svg>
 }
 </button>
 </div>

 <!-- Hidden file input -->
 <input type="file" #fileInput
 [accept]="accept()"
 (change)="onFileSelected($event)"
 class="file-input-hidden" />
</div>
