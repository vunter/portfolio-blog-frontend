@if (variant() === 'segmented') {
 <div class="theme-segmented" role="radiogroup" [attr.aria-label]="i18n.t('theme.toggle')">
 <button
 class="theme-segment"
 [class.active]="themeService.preference() === 'light'"
 (click)="themeService.setPreference('light')"
 [title]="i18n.t('theme.light')"
 role="radio"
 [attr.aria-checked]="themeService.preference() === 'light'"
 >
 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
 <circle cx="12" cy="12" r="5"/>
 <line x1="12" y1="1" x2="12" y2="3"/>
 <line x1="12" y1="21" x2="12" y2="23"/>
 <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
 <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
 <line x1="1" y1="12" x2="3" y2="12"/>
 <line x1="21" y1="12" x2="23" y2="12"/>
 <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
 <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
 </svg>
 </button>
 <button
 class="theme-segment theme-segment--auto"
 [class.active]="themeService.preference() === 'auto'"
 (click)="themeService.setPreference('auto')"
 [title]="i18n.t('theme.auto')"
 role="radio"
 [attr.aria-checked]="themeService.preference() === 'auto'"
 >
 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
 <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
 <line x1="8" y1="21" x2="16" y2="21"/>
 <line x1="12" y1="17" x2="12" y2="21"/>
 </svg>
 </button>
 <button
 class="theme-segment"
 [class.active]="themeService.preference() === 'dark'"
 (click)="themeService.setPreference('dark')"
 [title]="i18n.t('theme.dark')"
 role="radio"
 [attr.aria-checked]="themeService.preference() === 'dark'"
 >
 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
 <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
 </svg>
 </button>
 </div>
} @else {
 <button
 class="theme-slide-toggle"
 [class.compact]="variant() === 'compact'"
 [class.floating]="variant() === 'floating'"
 [class.sidebar]="variant() === 'sidebar'"
 (click)="themeService.toggleTheme()"
 [title]="themeService.isAuto() ? i18n.t('theme.auto') : themeService.isDark() ? i18n.t('theme.dark') : i18n.t('theme.light')"
 role="switch"
 [attr.aria-checked]="themeService.isDark()"
 [attr.aria-label]="i18n.t('theme.toggle')"
 >
 <span class="toggle-icon toggle-icon--sun" [class.active]="!themeService.isDark() && !themeService.isAuto()">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
 <circle cx="12" cy="12" r="5"/>
 <line x1="12" y1="1" x2="12" y2="3"/>
 <line x1="12" y1="21" x2="12" y2="23"/>
 <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
 <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
 <line x1="1" y1="12" x2="3" y2="12"/>
 <line x1="21" y1="12" x2="23" y2="12"/>
 <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
 <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
 </svg>
 </span>
 <span class="toggle-track">
 <span class="toggle-knob" [class.dark]="themeService.isDark()" [class.auto]="themeService.isAuto()"></span>
 </span>
 <span class="toggle-icon toggle-icon--moon" [class.active]="themeService.isDark() && !themeService.isAuto()">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
 <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
 </svg>
 </span>
 @if (showLabel()) {
 <span class="toggle-label-text">{{ themeService.isAuto() ? i18n.t('theme.label.auto') : themeService.isDark() ? i18n.t('theme.label.dark') : i18n.t('theme.label.light') }}</span>
 }
 </button>
}
