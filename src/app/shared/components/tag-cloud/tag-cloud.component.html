@if (loading()) {
  <app-loading-spinner [inline]="true" [size]="24" />
} @else {
  <div class="tag-cloud">
    @for (tag of tags(); track tag.slug || tag.name) {
      @if (tag.slug) {
        <a
          [routerLink]="['/blog/tag', tag.slug]"
          class="tag-chip"
          [style.background-color]="tag.color || '#6366f1'"
        >
          {{ tag.name }}
          @if (showCount() && tag.articleCount != null) {
            <span class="tag-chip__count">{{ tag.articleCount }}</span>
          }
        </a>
      } @else {
        <span class="tag-chip" [style.background-color]="tag.color || '#6366f1'">
          {{ tag.name }}
        </span>
      }
    } @empty {
      <p class="no-tags">No tags yet</p>
    }
  </div>
}
